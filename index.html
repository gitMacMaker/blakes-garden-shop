<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blake's Game Store — Back Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060e06;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --green: #52b788;
      --green-dim: rgba(82,183,136,0.12);
      --text: #fff;
      --muted: rgba(255,255,255,0.4);
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(82,183,136,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(82,183,136,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Animated particles */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--green);
      border-radius: 50%;
      opacity: 0;
      animation: float-up linear infinite;
    }
    @keyframes float-up {
      0%   { transform: translateY(0) scale(1); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.2; }
      100% { transform: translateY(-100vh) scale(0.3); opacity: 0; }
    }

    .wrap {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
    }

    /* Sprout icon */
    .sprout {
      margin: 0 auto 2rem;
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .store-name {
      font-family: 'Syne', sans-serif;
      font-weight: 900;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      letter-spacing: -.02em;
      margin-bottom: .3rem;
    }
    .store-name span { color: var(--green); }

    .tagline {
      font-size: 13px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    /* Status card */
    .card {
      background: var(--surface);
      border: 1px solid rgba(82,183,136,0.2);
      border-radius: 20px;
      padding: 2rem 1.75rem;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(82,183,136,0.5), transparent);
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #f59e0b;
      border-radius: 50%;
      margin-right: 8px;
      animation: pulse-dot 2s ease infinite;
      vertical-align: middle;
    }
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.4); }
      50% { box-shadow: 0 0 0 6px rgba(245,158,11,0); }
    }

    .status-label {
      font-size: 12px;
      font-weight: 700;
      color: #f59e0b;
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 1.25rem;
    }

    .headline {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      line-height: 1.15;
      margin-bottom: .75rem;
    }

    .body-text {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    /* Discord button */
    .discord-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #5865f2;
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 13px 24px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .15s, transform .15s;
      margin-top: .5rem;
    }
    .discord-btn:hover { opacity: .9; transform: translateY(-1px); }

    .footer-note {
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      margin-top: 2rem;
    }
    .footer-note span { color: rgba(82,183,136,0.5); }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="wrap">
  <div class="sprout">
    <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
      <circle cx="30" cy="55" r="8" fill="#52b788" opacity=".12"/>
      <path d="M30 55 Q30 40 30 20" stroke="#52b788" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M30 35 Q18 28 20 18 Q28 22 30 35Z" fill="#4caf50"/>
      <path d="M30 25 Q42 18 40 8 Q32 12 30 25Z" fill="#52b788"/>
    </svg>
  </div>

  <div class="store-name">Blake's <span>Game</span> Store</div>
  <div class="tagline">Real in-game items · Real trades</div>

  <div class="card">
    <div class="status-label">
      <span class="status-dot"></span>Temporarily Offline
    </div>
    <div class="headline">We'll be back<br>shortly.</div>
    <p class="body-text">The shop is currently offline for maintenance. Check back soon or join the Discord for updates on when we're back.</p>
  </div>

  <a href="https://discord.gg/7sMGwmv6AK" target="_blank" class="discord-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.036.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
    Get updates on Discord
  </a>

  <div class="footer-note">Blake's Game Store &nbsp;·&nbsp; <span>Back soon</span></div>
</div>

<script>
  // Generate floating particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.bottom = '-4px';
    p.style.width = p.style.height = (Math.random() * 2 + 1) + 'px';
    p.style.animationDuration = (Math.random() * 10 + 8) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.opacity = '0';
    container.appendChild(p);
  }
</script>

</body>
</html>
